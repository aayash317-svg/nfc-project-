{% extends 'base.html' %}

{% block content %}
<div style="max-width: 550px; margin: 0 auto; padding-top: 2rem;">
    <div class="glass-panel" style="padding: 2.5rem; position: relative; overflow: hidden;">

        <!-- Decoration Orb -->
        <div
            style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--primary); filter: blur(80px); opacity: 0.2; border-radius: 50%;">
        </div>

        <div style="margin-bottom: 2rem;">
            <a href="{{ url_for('dashboard') }}" class="sidebar-link"
                style="padding: 0; display: inline-flex; align-items: center; gap: 0.5rem; border: none;">
                <span style="font-size: 1.2rem;">&larr;</span> Back to Dashboard
            </a>
        </div>

        <div style="text-align: center; margin-bottom: 2.5rem;">
            <h2 class="text-gradient" style="font-size: 2.5rem; margin-bottom: 0.5rem;">Patient Access</h2>
            <p style="color: var(--text-muted);">Scan QR Code or Tap NFC Card</p>
        </div>

        <!-- Scanner Container -->
        <div
            style="border: 1px solid var(--glass-border); border-radius: var(--radius-md); background: rgba(0,0,0,0.2); padding: 1.5rem; margin-bottom: 2rem;">
            <div id="reader"
                style="width: 100%; border-radius: var(--radius-sm); overflow: hidden; border: none; background: transparent;">
            </div>

            <div id="scanner-controls"
                style="text-align: center; margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem; align-items: center;">
                <div id="scan-status" style="font-weight: 600; font-size: 0.9rem; color: var(--primary);">
                    🎥 Initializing Optical Sensor...
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button id="start-btn" class="btn-primary"
                        style="padding: 0.6rem 1.2rem; font-size: 0.85rem; background: var(--bg-card); border: 1px solid var(--primary); color: var(--primary);">Start
                        Scanning</button>
                    <button id="stop-btn" class="btn-primary"
                        style="padding: 0.6rem 1.2rem; font-size: 0.85rem; background: var(--bg-card); border: 1px solid var(--accent); color: var(--accent); display: none;">Stop
                        Scanning</button>
                </div>

                <div style="margin-top: 0.5rem;">
                    <label for="qr-input-file"
                        style="cursor: pointer; color: var(--primary); font-size: 0.9rem; font-weight: 600; text-decoration: underline; display: inline-block;">
                        Scan an Image File
                    </label>
                    <input type="file" id="qr-input-file" accept="image/*" style="display: none;">
                </div>
            </div>
        </div>

        <div style="position: relative; margin: 2rem 0; text-align: center;">
            <hr style="border: 0; border-top: 1px solid var(--glass-border);">
            <span
                style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-dark); padding: 0 1rem; color: var(--text-muted); font-size: 0.8rem; font-family: 'Space Grotesk'; font-weight: 700;">OR
                MANUAL ENTRY</span>
        </div>

        <form id="scan-form">
            <div class="form-group">
                <label for="scan_data"
                    style="margin-left: 0.5rem; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em;">Patient
                    ID / NFC Signature</label>
                <div style="position: relative;">
                    <span
                        style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); opacity: 0.5;">🆔</span>
                    <input type="text" id="scan_data" name="scan_data" class="form-control" placeholder="Scanning..."
                        required autofocus style="padding-left: 2.8rem;">
                </div>
                <small style="color: var(--text-muted); display: block; margin-top: 0.5rem; margin-left: 0.5rem;">(Wait
                    for scan or type ID like 'PPT-8821-X')</small>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1.1rem;">
                Access Patient Records
            </button>
        </form>
    </div>
</div>

<!-- HTML5-QRCode Library -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const scanStatus = document.getElementById('scan-status');
        const inputField = document.getElementById('scan_data');
        const form = document.getElementById('scan-form');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const fileInput = document.getElementById('qr-input-file');

        // Defensive check: Ensure we don't double-initialize if script runs twice
        if (window.scannerInitialized) return;
        window.scannerInitialized = true;

        const html5QrCode = new Html5Qrcode("reader");
        let isCameraActive = false;

        const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

        function onScanSuccess(decodedText, decodedResult) {
            scanStatus.innerText = "✅ IDENTITY VERIFIED";
            scanStatus.style.color = "#10b981"; // Emerald
            inputField.value = decodedText;

            // Auto submit
            setTimeout(() => {
                form.querySelector('button[type="submit"]').click();
            }, 300);

            if (isCameraActive) {
                stopCamera();
            }
        }

        async function startCamera() {
            try {
                await html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);
                isCameraActive = true;
                startBtn.style.display = 'none';
                stopBtn.style.display = 'inline-block';
                scanStatus.innerText = "🎥 SENSOR ACTIVE - AWAITING SCAN";
                scanStatus.style.color = "var(--primary)";
            } catch (err) {
                console.error("Camera start error:", err);
                scanStatus.innerText = "❌ CAM_INIT_ERROR: Check Permissions";
                scanStatus.style.color = "var(--accent)";
            }
        }

        async function stopCamera() {
            try {
                await html5QrCode.stop();
                isCameraActive = false;
                startBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                scanStatus.innerText = "💤 SENSOR STANDBY";
                scanStatus.style.color = "var(--text-muted)";
            } catch (err) {
                console.error("Camera stop error:", err);
            }
        }

        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);

        // File Scan Support
        fileInput.addEventListener('change', async (e) => {
            if (e.target.files.length == 0) return;

            const imageFile = e.target.files[0];
            scanStatus.innerText = "🔄 ANALYZING_FILE...";
            scanStatus.style.color = "var(--secondary)";

            try {
                const decodedText = await html5QrCode.scanFile(imageFile, true);
                onScanSuccess(decodedText);
            } catch (err) {
                console.error("File scan error:", err);
                scanStatus.innerText = "❌ NO_QR_SIGNATURE_FOUND";
                scanStatus.style.color = "var(--accent)";
                setTimeout(() => {
                    scanStatus.innerText = isCameraActive ? "🎥 SENSOR ACTIVE - AWAITING SCAN" : "💤 SENSOR STANDBY";
                    scanStatus.style.color = isCameraActive ? "var(--primary)" : "var(--text-muted)";
                }, 3000);
            }
        });

        // Initialize camera on load
        startCamera();
    });
</script>

<style>
    #reader__scan_region {
        border: none !important;
    }

    #reader video {
        border-radius: var(--radius-sm);
        object-fit: cover !important;
    }
</style>
{% endblock %}
